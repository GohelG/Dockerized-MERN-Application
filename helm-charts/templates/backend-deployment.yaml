apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-service
spec:
  template:
    spec:
      containers:
        - name: backend
          image: "{{ .Values.global.registry }}/hello-service:{{ .Values.global.tag }}"
          env:
            - name: MONGO_URI
              valueFrom:
                secretKeyRef:
                  name: mern-app-secrets
                  key: MONGO_URI
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: mern-app-secrets
                  key: JWT_SECRET

